<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Grading System</title>

  <!-- Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-950 via-slate-900 to-slate-950 flex items-center justify-center">
  <div class="w-full max-w-2xl px-4">
    <div class="bg-slate-900/80 backdrop-blur-xl border border-slate-800/80 shadow-2xl rounded-2xl p-8">
      <div class="mb-6 text-center">
        <h1 class="text-2xl font-semibold text-white">
          Student Grading System
        </h1>
      </div>

      <form id="grade-form" class="space-y-6">
        <!-- Student Name -->
        <div class="space-y-1">
          <label for="student-name" class="block text-sm font-medium text-slate-100">
            Student
          </label>
          <input
            id="student-name"
            type="text"
            required
            class="w-full rounded-lg border border-slate-700 bg-slate-900 text-slate-100 placeholder-slate-500 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          />
        </div>

        <!-- Phase 1: Subject Names Input -->
        <div id="phase1-subjects" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <div>
            <label for="subject1-name" class="block text-xs font-medium text-slate-300 mb-1">
              Subject 1 Name
            </label>
            <input
              id="subject1-name"
              type="text"
              class="w-full rounded-lg border border-slate-700 bg-slate-900 text-slate-100 px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            />
          </div>
          <div>
            <label for="subject2-name" class="block text-xs font-medium text-slate-300 mb-1">
              Subject 2 Name
            </label>
            <input
              id="subject2-name"
              type="text"
              class="w-full rounded-lg border border-slate-700 bg-slate-800 text-slate-100 px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            />
          </div>
          <div>
            <label for="subject3-name" class="block text-xs font-medium text-slate-300 mb-1">
              Subject 3 Name
            </label>
            <input
              id="subject3-name"
              type="text"
              class="w-full rounded-lg border border-slate-700 bg-slate-800 text-slate-100 px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            />
          </div>
          <div>
            <label for="subject4-name" class="block text-xs font-medium text-slate-300 mb-1">
              Subject 4 Name
            </label>
            <input
              id="subject4-name"
              type="text"
              class="w-full rounded-lg border border-slate-700 bg-slate-800 text-slate-100 px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            />
          </div>
          <div>
            <label for="subject5-name" class="block text-xs font-medium text-slate-300 mb-1">
              Subject 5 Name
            </label>
            <input
              id="subject5-name"
              type="text"
              class="w-full rounded-lg border border-slate-700 bg-slate-800 text-slate-100 px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
            />
          </div>
        </div>

        <!-- Phase 2: Grade Inputs (Initially Hidden) -->
        <div id="phase2-grades" class="hidden">
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div>
              <label for="grade1" class="block text-sm font-medium text-slate-200 mb-1">
                <span id="subject1-display">Subject 1</span> - Grade (1.0-5.0)
              </label>
              <input
                id="grade1"
                type="number"
                step="0.01"
                min="1"
                max="5"
                class="w-full rounded-lg border border-slate-700 bg-slate-900 text-slate-100 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
              />
            </div>
            <div>
              <label for="grade2" class="block text-sm font-medium text-slate-200 mb-1">
                <span id="subject2-display">Subject 2</span> - Grade (1.0-5.0)
              </label>
              <input
                id="grade2"
                type="number"
                step="0.01"
                min="1"
                max="5"
                class="w-full rounded-lg border border-slate-700 bg-slate-900 text-slate-100 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
              />
            </div>
            <div>
              <label for="grade3" class="block text-sm font-medium text-slate-200 mb-1">
                <span id="subject3-display">Subject 3</span> - Grade (1.0-5.0)
              </label>
              <input
                id="grade3"
                type="number"
                step="0.01"
                min="1"
                max="5"
                class="w-full rounded-lg border border-slate-700 bg-slate-900 text-slate-100 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
              />
            </div>
            <div>
              <label for="grade4" class="block text-sm font-medium text-slate-200 mb-1">
                <span id="subject4-display">Subject 4</span> - Grade (1.0-5.0)
              </label>
              <input
                id="grade4"
                type="number"
                step="0.01"
                min="1"
                max="5"
                class="w-full rounded-lg border border-slate-700 bg-slate-900 text-slate-100 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
              />
            </div>
            <div>
              <label for="grade5" class="block text-sm font-medium text-slate-200 mb-1">
                <span id="subject5-display">Subject 5</span> - Grade (1.0-5.0)
              </label>
              <input
                id="grade5"
                type="number"
                step="0.01"
                min="1"
                max="5"
                class="w-full rounded-lg border border-slate-700 bg-slate-900 text-slate-100 px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
              />
            </div>
          </div>
        </div>

        <!-- Actions -->
        <button
          type="button"
          id="save-subjects-button"
          class="w-full mt-2 inline-flex items-center justify-center rounded-lg bg-indigo-500 hover:bg-indigo-400 text-sm font-semibold text-white py-2.5 transition disabled:opacity-60 disabled:cursor-not-allowed"
        >
          Save Subjects
        </button>

        <button
          type="submit"
          id="submit-button"
          class="w-full mt-2 inline-flex items-center justify-center rounded-lg bg-emerald-600 hover:bg-emerald-500 text-sm font-semibold text-white py-2.5 transition disabled:opacity-60 disabled:cursor-not-allowed hidden"
        >
          Calculate Average
        </button>
      </form>

      <!-- Results / Messages -->
      <div id="output" class="mt-6 space-y-2">
        <p id="average-display" class="text-center text-lg font-semibold text-emerald-300 hidden"></p>
        <p id="status-message" class="text-center text-xs text-slate-400"></p>
      </div>
    </div>
  </div>

  <!-- Supabase JS via CDN -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <!-- App Logic -->
  <script src="./app.js" defer></script>
</body>
</html>
