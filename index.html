<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>BSIT 3-B Student Grading System</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<!-- Fireworks Library -->
<script src="https://cdn.jsdelivr.net/npm/tsparticles@2/tsparticles.bundle.min.js"></script>

</head>

<body class="bg-red-50 min-h-screen relative">

<!-- Fireworks Background -->
<div id="tsparticles" class="absolute inset-0 -z-10"></div>

<header class="bg-red-700 text-white p-4 text-center text-xl font-bold">
BSIT 3-B Student Grading System
</header>

<div class="max-w-4xl mx-auto mt-8 bg-white p-6 rounded shadow">

<h2 class="text-xl font-semibold mb-4 text-red-700">
Student Grade Entry Dashboard
</h2>

<form id="grade-form" class="space-y-4">

<input id="student-name" type="text" placeholder="Student Name"
class="border-2 border-red-500 p-2 w-full rounded" required>

<div id="phase1-subjects" class="grid grid-cols-2 gap-2">

<input id="subject1-name" placeholder="Subject 1 Name" class="border-2 border-red-500 p-2 rounded">
<input id="subject2-name" placeholder="Subject 2 Name" class="border-2 border-red-500 p-2 rounded">
<input id="subject3-name" placeholder="Subject 3 Name" class="border-2 border-red-500 p-2 rounded">
<input id="subject4-name" placeholder="Subject 4 Name" class="border-2 border-red-500 p-2 rounded">
<input id="subject5-name" placeholder="Subject 5 Name" class="border-2 border-red-500 p-2 rounded">

</div>

<button id="save-subjects-button"
class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded w-full">
Save Subjects
</button>

<div id="phase2-grades" class="hidden grid grid-cols-2 gap-2">

<input id="grade1" type="number" step="0.01" min="1" max="5" placeholder="Grade (1.00-5.00)" class="border-2 border-red-500 p-2 rounded">
<input id="grade2" type="number" step="0.01" min="1" max="5" placeholder="Grade (1.00-5.00)" class="border-2 border-red-500 p-2 rounded">
<input id="grade3" type="number" step="0.01" min="1" max="5" placeholder="Grade (1.00-5.00)" class="border-2 border-red-500 p-2 rounded">
<input id="grade4" type="number" step="0.01" min="1" max="5" placeholder="Grade (1.00-5.00)" class="border-2 border-red-500 p-2 rounded">
<input id="grade5" type="number" step="0.01" min="1" max="5" placeholder="Grade (1.00-5.00)" class="border-2 border-red-500 p-2 rounded">

</div>

<button id="submit-button" type="submit"
class="bg-red-600 hover:bg-red-700 text-white px-4 py-2 rounded w-full hidden">
Calculate Average
</button>

</form>

<p id="average-display" class="text-lg font-bold mt-4 text-red-700 hidden"></p>
<p id="status-message" class="text-sm mt-2 text-red-600"></p>

</div>


<!-- STUDENT HISTORY -->

<div class="max-w-4xl mx-auto mt-6 bg-white p-6 rounded shadow">

<h2 class="text-lg font-semibold mb-4 text-red-700">
Student Records
</h2>

<table class="w-full border text-center">

<thead class="bg-red-200">

<tr>

<th class="border p-2">Student</th>

<th class="border p-2" id="th-sub1">Subject 1</th>
<th class="border p-2" id="th-sub2">Subject 2</th>
<th class="border p-2" id="th-sub3">Subject 3</th>
<th class="border p-2" id="th-sub4">Subject 4</th>
<th class="border p-2" id="th-sub5">Subject 5</th>

<th class="border p-2">Average</th>

</tr>

</thead>

<tbody id="student-history">

<tr>
<td colspan="7">No records yet</td>
</tr>

</tbody>

</table>

</div>

<footer class="mt-10 bg-red-700 text-white text-center p-3 text-sm">
© Student Grading System
</footer>

<script src="app.js"></script>

<!-- Fireworks Script -->
<script>
tsParticles.load("tsparticles", {
  background: {
    color: "transparent"
  },
  particles: {
    number: { value: 0 },
    color: { value: ["#ff0000", "#ffffff"] },
    shape: { type: "circle" },
    opacity: { value: 1 },
    size: { value: { min: 1, max: 3 } },
    move: {
      enable: true,
      speed: 10,
      direction: "top",
      outModes: { default: "destroy" }
    }
  },
  emitters: {
    direction: "top",
    rate: {
      delay: 0.2,
      quantity: 3
    },
    position: {
      x: 50,
      y: 100
    },
    size: {
      width: 100,
      height: 0
    }
  }
});
</script>

</body>
</html>
