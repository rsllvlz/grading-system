<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Rainbow Student Grading System</title>

<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com"></script>

<style>
  /* Rainbow background animation */
  body {
    background: linear-gradient(270deg, red, orange, yellow, green, blue, indigo, violet);
    background-size: 1400% 1400%;
    animation: rainbowBG 20s ease infinite;
  }

  @keyframes rainbowBG {
    0% { background-position: 0% 50%; }
    50% { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  /* Fireworks canvas */
  #fireworks {
    position: fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    z-index:40;
    pointer-events:none;
  }
</style>

</head>
<body class="min-h-screen flex items-center justify-center relative">

<!-- Fireworks Canvas -->
<canvas id="fireworks"></canvas>

<div class="w-full max-w-2xl px-4 z-50 relative">

<div class="bg-white/20 backdrop-blur-xl border border-white/30 shadow-2xl rounded-2xl p-8">

<div class="mb-6 text-center">
<h1 class="text-2xl font-bold bg-gradient-to-r from-red-500 via-yellow-400 via-green-400 via-blue-500 to-purple-600 bg-clip-text text-transparent">
🎉 Student Grading System 🎉
</h1>
</div>

<form id="grade-form" class="space-y-6">

<!-- Student Name -->
<div>
<label class="block text-sm font-medium text-white">Student</label>
<input id="student-name" type="text" required
class="w-full rounded-lg border border-white/40 bg-white/10 text-white px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-indigo-500"/>
</div>

<!-- Subject Names -->
<div id="phase1-subjects" class="grid grid-cols-1 sm:grid-cols-2 gap-4">
  <div><label class="text-xs text-white">Subject 1 Name</label><input id="subject1-name" type="text" class="w-full rounded-lg border border-white/40 bg-white/10 text-white px-3 py-1.5 text-xs"/></div>
  <div><label class="text-xs text-white">Subject 2 Name</label><input id="subject2-name" type="text" class="w-full rounded-lg border border-white/40 bg-white/10 text-white px-3 py-1.5 text-xs"/></div>
  <div><label class="text-xs text-white">Subject 3 Name</label><input id="subject3-name" type="text" class="w-full rounded-lg border border-white/40 bg-white/10 text-white px-3 py-1.5 text-xs"/></div>
  <div><label class="text-xs text-white">Subject 4 Name</label><input id="subject4-name" type="text" class="w-full rounded-lg border border-white/40 bg-white/10 text-white px-3 py-1.5 text-xs"/></div>
  <div><label class="text-xs text-white">Subject 5 Name</label><input id="subject5-name" type="text" class="w-full rounded-lg border border-white/40 bg-white/10 text-white px-3 py-1.5 text-xs"/></div>
</div>

<!-- Grades -->
<div id="phase2-grades" class="hidden">
<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
  <div><label class="text-sm text-white"><span id="subject1-display">Subject 1</span> Grade</label><input id="grade1" type="number" step="0.01" min="1" max="5" class="w-full rounded-lg border border-white/40 bg-white/10 text-white px-3 py-2"/></div>
  <div><label class="text-sm text-white"><span id="subject2-display">Subject 2</span> Grade</label><input id="grade2" type="number" step="0.01" min="1" max="5" class="w-full rounded-lg border border-white/40 bg-white/10 text-white px-3 py-2"/></div>
  <div><label class="text-sm text-white"><span id="subject3-display">Subject 3</span> Grade</label><input id="grade3" type="number" step="0.01" min="1" max="5" class="w-full rounded-lg border border-white/40 bg-white/10 text-white px-3 py-2"/></div>
  <div><label class="text-sm text-white"><span id="subject4-display">Subject 4</span> Grade</label><input id="grade4" type="number" step="0.01" min="1" max="5" class="w-full rounded-lg border border-white/40 bg-white/10 text-white px-3 py-2"/></div>
  <div><label class="text-sm text-white"><span id="subject5-display">Subject 5</span> Grade</label><input id="grade5" type="number" step="0.01" min="1" max="5" class="w-full rounded-lg border border-white/40 bg-white/10 text-white px-3 py-2"/></div>
</div>
</div>

<!-- Buttons -->
<button type="button" id="save-subjects-button"
class="w-full rounded-lg bg-gradient-to-r from-red-500 via-yellow-400 to-green-500 text-white py-2.5 font-semibold hover:opacity-90">
Save Subjects
</button>

<button type="submit" id="submit-button"
class="w-full rounded-lg bg-gradient-to-r from-indigo-500 via-purple-500 to-pink-500 text-white py-2.5 font-semibold hidden">
Calculate Average
</button>

</form>

<!-- Output -->
<div id="output" class="mt-6 text-center">
<p id="average-display" class="text-lg font-bold text-white hidden"></p>
<p id="status-message" class="text-xs text-white/80"></p>
</div>

</div>

</div>

<!-- Supabase -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

<!-- Fireworks effect -->
<script>
const canvas = document.getElementById('fireworks');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

class Firework {
    constructor() {
        this.reset();
    }
    reset() {
        this.x = Math.random() * canvas.width;
        this.y = canvas.height;
        this.radius = 2 + Math.random()*2;
        this.color = `hsl(${Math.random()*360},100%,50%)`;
        this.speed = 2 + Math.random()*2;
        this.angle = Math.random() * Math.PI - Math.PI/2;
        this.alpha = 1;
    }
    update() {
        this.x += this.speed * Math.cos(this.angle);
        this.y += this.speed * Math.sin(this.angle) * -1;
        this.alpha -= 0.02;
        if(this.alpha <= 0) this.reset();
    }
    draw() {
        ctx.globalAlpha = this.alpha;
        ctx.beginPath();
        ctx.arc(this.x,this.y,this.radius,0,Math.PI*2);
        ctx.fillStyle = this.color;
        ctx.fill();
    }
}

const fireworks = [];
for(let i=0;i<50;i++) fireworks.push(new Firework());

function animate(){
    ctx.clearRect(0,0,canvas.width,canvas.height);
    fireworks.forEach(fw => { fw.update(); fw.draw(); });
    requestAnimationFrame(animate);
}
animate();
</script>

<!-- App Script -->
<script src="./app.js" defer></script>

</body>
</html>
