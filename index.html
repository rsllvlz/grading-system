<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emilie Baay Grading System</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="min-h-screen bg-gradient-to-br from-[#f5ede3] via-[#e7d7c9] to-[#d6c3b3]">

<!-- HEADER -->
<header class="bg-[#5c4033] text-white shadow-md">
  <div class="max-w-5xl mx-auto px-6 py-4">
    <h1 class="text-2xl font-semibold tracking-wide">
      Emilie Baay Grading System
    </h1>
  </div>
</header>

<!-- MAIN -->
<main class="max-w-5xl mx-auto px-6 py-10">

  <!-- FORM CARD -->
  <section class="bg-white/80 backdrop-blur-md border border-[#d6c3b3] rounded-2xl shadow-xl p-8">

    <h2 class="text-lg font-semibold text-[#5c4033] mb-6">
      Enter Student Grades
    </h2>

    <form id="grade-form" class="space-y-5">

      <!-- NAME -->
      <input id="student-name" type="text" placeholder="Student Name" required
        class="w-full p-3 rounded-xl border border-[#d6c3b3] bg-[#faf6f2] text-[#5c4033] focus:ring-2 focus:ring-[#a67c52] outline-none">

      <!-- INPUT GRID -->
      <div class="grid md:grid-cols-2 gap-4">

        <input id="quiz" type="number" max="100" placeholder="Quiz (20%)"
          class="p-3 rounded-xl border border-[#d6c3b3] bg-[#faf6f2]">

        <input id="lab" type="number" max="100" placeholder="Laboratory (30%)"
          class="p-3 rounded-xl border border-[#d6c3b3] bg-[#faf6f2]">

        <input id="assignment" type="number" max="100" placeholder="Assignment (10%)"
          class="p-3 rounded-xl border border-[#d6c3b3] bg-[#faf6f2]">

        <input id="attendance" type="number" max="100" placeholder="Attendance (10%)"
          class="p-3 rounded-xl border border-[#d6c3b3] bg-[#faf6f2]">

        <input id="exam" type="number" max="100" placeholder="Major Exam (30%)"
          class="p-3 rounded-xl border border-[#d6c3b3] bg-[#faf6f2]">
      </div>

      <!-- BUTTON -->
      <button type="submit"
        class="w-full bg-[#5c4033] hover:bg-[#4a3329] text-white py-3 rounded-xl font-semibold transition shadow-md">
        Calculate Final Grade
      </button>

    </form>
  </section>

  <!-- TABLE -->
  <section class="mt-8 bg-white/80 backdrop-blur-md border border-[#d6c3b3] rounded-2xl shadow-xl p-6">

    <h2 class="text-lg font-semibold text-[#5c4033] mb-4">
      Results
    </h2>

    <div class="overflow-x-auto">
      <table class="w-full text-center rounded-xl overflow-hidden">

        <thead class="bg-[#e7d7c9] text-[#5c4033]">
          <tr>
            <th class="p-3">Name</th>
            <th>Quiz</th>
            <th>Lab</th>
            <th>Assign</th>
            <th>Attend</th>
            <th>Exam</th>
            <th>Final</th>
          </tr>
        </thead>

        <tbody id="final-body" class="bg-white"></tbody>

      </table>
    </div>

  </section>

</main>

<script src="app.js"></script>

</body>
</html>

<footer class="text-center py-4 text-[#5c4033] text-sm">
  © <span id="year"></span> Emilie Baay Grading System. All rights reserved.
</footer>
